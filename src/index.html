<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Telegram Web App - Odoo Frontend" />
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <title>Telegram Web App</title>

    <style>
      /* Simple CSS to prevent white flash during load in Dark Mode */
      body {
        margin: 0;
        background-color: #ffffff; 
        color: #000000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      
      /* Telegram theme integration */
      body.tg-dark {
        background-color: #1c1c1d;
        color: #ffffff;
      }

      #root-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root">
      <div id="root-loader">
        <p>Loading App...</p>
      </div>
    </div>

    <script>
      // 3. IMMEDIATE DEBUGGING
      // This script runs immediately to check if Telegram is working
      (function() {
        const tg = window.Telegram?.WebApp;
        if (tg) {
          tg.ready();
          tg.expand();
          console.log("Telegram WebApp Script initialized.");
          // Apply Telegram theme classes to body
          document.body.classList.add(tg.colorScheme === 'dark' ? 'tg-dark' : 'tg-light');
        } else {
          console.warn("Telegram WebApp script not detected. Running in browser mode.");
        }
      })();
    </script>
  </body>
</html>
